<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent - Live Workflow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 90vh;
        }

        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Chat Section */
        .chat-section {
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
        }

        .chat-title {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
            color: #333;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 15px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message.system .message-content {
            background: #f0f0f0;
            color: #666;
            font-size: 13px;
            font-style: italic;
            text-align: center;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        #sendBtn:hover {
            background: #5568d3;
        }

        #sendBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .controls {
            padding: 10px 20px 0;
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .btn-small:hover {
            background: #e0e0e0;
        }

        /* Workflow Section */
        .workflow-section {
            display: flex;
            flex-direction: column;
            background: #fff;
            padding: 20px;
        }

        .workflow-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .workflow-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .workflow-step {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #e0e0e0;
            transition: all 0.3s;
        }

        .workflow-step.active {
            background: #e3f2fd;
            border-left-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .workflow-step.complete {
            border-left-color: #4caf50;
        }

        .workflow-step.error {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .workflow-step.active .step-icon {
            background: #667eea;
            animation: pulse 1s infinite;
        }

        .workflow-step.complete .step-icon {
            background: #4caf50;
        }

        .workflow-step.error .step-icon {
            background: #f44336;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }
        }

        .step-content {
            flex: 1;
        }

        .step-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .step-details {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #666;
        }

        .step-duration {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .step-docs {
            background: rgba(102, 126, 234, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            color: #667eea;
        }

        /* Memory Status */
        .memory-status {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .memory-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 13px;
        }

        .memory-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .memory-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .memory-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .chat-section {
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                min-height: 50vh;
            }

            .workflow-section {
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🤖 RAG Agent - Live Workflow</h1>
            <p>Chat with AI - Watch the pipeline work in real-time</p>
        </div>

        <!-- Chat Section -->
        <div class="chat-section">
            <div class="chat-title">💬 Chat</div>

            <div class="messages" id="messagesContainer">
                <div class="message system">
                    <div class="message-content">
                        Welcome! Ask me about Singapore attractions, tours, and packages. 🌏
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-small" onclick="clearChat()">🗑️ Clear</button>
                <button class="btn-small" onclick="toggleMemory()">📊 Memory</button>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Ask me something about Singapore..."
                    onkeypress="if(event.key==='Enter') sendMessage()"
                />
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- Workflow Section -->
        <div class="workflow-section">
            <div class="workflow-title">⚙️ RAG Pipeline</div>

            <div class="workflow-container" id="workflowContainer">
                <!-- Workflow steps will be rendered here -->
            </div>

            <!-- Memory Status -->
            <div class="memory-status">
                <div class="memory-title">Memory Status</div>
                <div class="memory-bar">
                    <div class="memory-fill" id="memoryFill" style="width: 0%"></div>
                </div>
                <div class="memory-info">
                    <span>Messages: <strong id="memoryCount">0</strong>/20</span>
                    <span id="memoryPercent">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ====================================================================
        // SECTION 1: Workflow Rendering
        // ====================================================================

        const WORKFLOW_STEPS = [
            {
                id: 'memory',
                name: 'Store Input',
                icon: '💾',
                description: 'Save question to memory'
            },
            {
                id: 'search',
                name: 'Search Knowledge Base',
                icon: '🔍',
                description: 'Find relevant documents in Pinecone'
            },
            {
                id: 'augment',
                name: 'Augment Prompt',
                icon: '📝',
                description: 'Add context to the question'
            },
            {
                id: 'llm',
                name: 'Generate Response',
                icon: '🧠',
                description: 'Get answer from Gemini LLM'
            },
            {
                id: 'memory_save',
                name: 'Save Response',
                icon: '💾',
                description: 'Store response to memory'
            }
        ];

        function initWorkflow() {
            const container = document.getElementById('workflowContainer');
            container.innerHTML = WORKFLOW_STEPS
                .map(step => `
                    <div class="workflow-step" id="step-${step.id}">
                        <div class="step-icon">${step.icon}</div>
                        <div class="step-content">
                            <div class="step-name">${step.name}</div>
                            <div class="step-details">
                                <span>${step.description}</span>
                                <span class="step-duration" id="duration-${step.id}"></span>
                            </div>
                        </div>
                    </div>
                `)
                .join('');
        }

        // ====================================================================
        // SECTION 2: Chat Functions
        // ====================================================================

        function addMessage(content, role = 'assistant') {
            const container = document.getElementById('messagesContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;
            messageEl.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        function updateWorkflowStep(stepId, data) {
            const stepEl = document.getElementById(`step-${stepId}`);
            if (!stepEl) return;

            // Update status
            stepEl.classList.remove('active', 'complete', 'error');
            if (data.status === 'complete') {
                stepEl.classList.add('complete');
            } else if (data.status === 'error') {
                stepEl.classList.add('error');
            } else {
                stepEl.classList.add('active');
            }

            // Update duration
            const durationEl = document.getElementById(`duration-${stepId}`);
            if (data.duration) {
                durationEl.textContent = `${data.duration}ms`;
            }

            // Update doc count
            if (data.docs_found !== undefined) {
                const detailsEl = stepEl.querySelector('.step-details');
                detailsEl.innerHTML += ` <span class="step-docs">${data.docs_found} docs found</span>`;
            }
        }

        function updateMemoryStatus(memory) {
            document.getElementById('memoryFill').style.width = memory.percentage + '%';
            document.getElementById('memoryCount').textContent = memory.total_messages;
            document.getElementById('memoryPercent').textContent = Math.round(memory.percentage) + '%';
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const sendBtn = document.getElementById('sendBtn');

            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;

            // Show loading state
            addMessage('⏳ Processing...', 'system');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                // Remove loading message
                const messagesContainer = document.getElementById('messagesContainer');
                const lastMessage = messagesContainer.lastChild;
                if (lastMessage && lastMessage.classList.contains('system')) {
                    lastMessage.remove();
                }

                if (data.success) {
                    // Update workflow steps
                    initWorkflow();
                    for (const step of data.workflow_steps) {
                        updateWorkflowStep(step.step, step);
                    }

                    // Update memory
                    updateMemoryStatus(data.memory);

                    // Add bot response
                    addMessage(data.response, 'assistant');
                } else {
                    addMessage(`Error: ${data.error}`, 'system');
                }
            } catch (error) {
                addMessage(`Error: ${error.message}`, 'system');
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        async function clearChat() {
            if (!confirm('Clear conversation history?')) return;

            try {
                await fetch('/api/clear', { method: 'POST' });
                document.getElementById('messagesContainer').innerHTML = `
                    <div class="message system">
                        <div class="message-content">
                            Conversation cleared. Start fresh! 🎉
                        </div>
                    </div>
                `;
                updateMemoryStatus({ total_messages: 0, percentage: 0 });
                initWorkflow();
            } catch (error) {
                alert('Error clearing chat: ' + error.message);
            }
        }

        async function toggleMemory() {
            try {
                const response = await fetch('/api/memory');
                const memory = await response.json();
                const msg = `Memory: ${memory.total_messages}/${memory.max_capacity} messages (${Math.round(memory.percentage)}%)`;
                alert(msg);
            } catch (error) {
                alert('Error getting memory status: ' + error.message);
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initWorkflow();
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
